# Contoh konfigurasi Bootcamp Agent (salin ke config.toml lalu edit,
# atau cukup jalankan `python main.py` dan wizard setup akan menulisnya).
[llm]
base_url = "https://api.openai.com/v1"
api_key = "sk-..."
model = "gpt-4o"
max_tokens = 4096
temperature = 0.0
api_type = "openai"

# Pembatas keamanan untuk alat eksekusi (Bash / Python / jaringan alat Browser).
# mode:
#   "off"      -> tidak ada batasan (default; cetak peringatan sekali)
#   "warn"     -> catat pelanggaran, tetap izinkan
#   "enforce"  -> BLOKIR perintah/URL berbahaya (fail-closed, disarankan)
# Bila bagian [sandbox] dihapus sama sekali, perilakunya = "off".
[sandbox]
mode = "enforce"
timeout = 300
allow_private_net = false

# Penyimpanan memori/state tahan-lama opsional.
# type: "memory" (default, sementara, tanpa setup) | "sqlite" (berkas, stdlib) | <custom>
# Pengguna dapat menambah backend sendiri (Postgres, Redis, vector DB, pohon berkas, dsb.)
# dengan subclass StoreBackend di app/store.py dan mendaftarkannya di STORE_BACKENDS.
[store]
type = "memory"
# opsi untuk backend terpilih, mis. untuk sqlite: { path = "memory.db" }

# Integrasi eksternal — cukup isi API key agar alat terkait aktif.
# Kosongkan baris mana pun untuk menonaktifkan. Agen hanya memuat alat
# yang kredensialnya tersedia (tidak membawa alat mati).
[integrations]
captcha_api_key = ""     # 2captcha — aktifkan alat captcha_solver
resend_api_key = ""      # Resend — aktifkan alat email_sender (fallback SMTP via env OML_SMTP_*)
vercel_token = ""        # Vercel — aktifkan alat vercel
cloudflare_token = ""    # Cloudflare — aktifkan alat cloudflare
cloudflare_zone = ""     # Zone ID default untuk alat cloudflare

# Generasi gambar (image_generation) — default NVIDIA GenAI FLUX.1-dev.
# Isi api_key dengan key NVIDIA Anda. Default base_url & model sudah siap;
# user cukup memasukkan API key sendiri agar alat aktif benar-benar generate.
[image]
base_url = "https://ai.api.nvidia.com/v1/genai/"
api_key = ""             # isi key NVIDIA (nvapi-...) agar image_generation berfungsi
model = "black-forest-labs/flux.1-dev"
output_dir = "workspace/images"

# Bot chat Telegram / Discord — semua opsional, cukup isi token untuk aktif.
# Setelah diisi, jalankan: python bot/run_bot.py
[bot]
telegram_token = ""          # token dari @BotFather
discord_token = ""           # token dari Discord Developer Portal
mode = "single"              # single (Bootcamp) | multi (Supervisor)
allowed_telegram_users = ""  # ID user dipisah koma (kosong = semua)
allowed_discord_guilds = ""  # ID guild dipisah koma (kosong = semua)
prod = false                 # true = wajib ada allow-list (tolak bila kosong)
